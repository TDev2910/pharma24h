---
deployment:
  tasks:
    # Đường dẫn thư mục chạy web trên cPanel của bạn
    - export DEPLOYPATH=/home/bjzezjqv/public_html

    # Sao chép toàn bộ code vào thư mục web (trừ các thư mục không cần thiết)
    - /bin/rsync -av --exclude '.git' --exclude '.github' --exclude 'node_modules' --exclude 'tests' . $DEPLOYPATH/

    # Cài đặt thư viện PHP (composer)
    - cd $DEPLOYPATH && /usr/local/bin/php /usr/local/bin/composer install --no-dev --optimize-autoloader --no-interaction

    # Chạy database migration
    - cd $DEPLOYPATH && /usr/local/bin/php artisan migrate --force

    # Xóa cache cũ và tối ưu lại
    - cd $DEPLOYPATH && /usr/local/bin/php artisan optimize:clear
    - cd $DEPLOYPATH && /usr/local/bin/php artisan optimize
