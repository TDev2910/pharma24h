name: Laravel CI

on:
  push:
    branches: [ "main", "dev" ] # Cập nhật: Theo dõi cả nhánh dev
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  laravel-tests:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, bcmath, gd, zip, sqlite3 # Thêm sqlite3 cho chắc chắn
        tools: composer:v2

    # --- TỐI ƯU 1: Thêm Cache cho Composer giúp chạy nhanh gấp đôi ---
    - name: Cache Composer packages
      id: composer-cache
      uses: actions/cache@v3
      with:
        path: vendor
        key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-php-

    - name: Copy .env
      run: php -r "file_exists('.env') || copy('.env.example', '.env');"

    # --- TỐI ƯU 2: Chỉ cài đặt nếu cache không tồn tại hoặc có thay đổi ---
    - name: Install Dependencies
      if: steps.composer-cache.outputs.cache-hit != 'true'
      run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist --ignore-platform-reqs

    - name: Generate key
      run: php artisan key:generate

    - name: Directory Permissions
      run: chmod -R 777 storage bootstrap/cache

    - name: Create Database
      run: |
        mkdir -p database
        touch database/database.sqlite

    - name: Execute tests
      env:
        DB_CONNECTION: sqlite
        DB_DATABASE: database/database.sqlite
      run: php artisan test
