name: Laravel CI/CD Workflow # Tên quy trình: Kiểm tra và đóng gói dự án Sức Khỏe 24h

on:
  push:
    branches: ["main", "dev"] # Kích hoạt khi có code push lên nhánh main hoặc dev
  pull_request:
    branches: ["main", "dev"] # Kích hoạt khi có yêu cầu gộp code (Pull Request)

jobs:
  laravel-tests: # Công việc 1: Chạy Test và Build Assets
    runs-on: ubuntu-latest # Chạy trên hệ điều hành Ubuntu mới nhất của GitHub

    steps:
      - name: Checkout code # Bước: Lấy mã nguồn từ GitHub vào máy ảo
        uses: actions/checkout@v4

      - name: Setup PHP # Bước: Cài đặt môi trường PHP 8.2 và các extension cần thiết
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, bcmath, gd, zip, sqlite3
          tools: composer:v2

      - name: Cache Composer packages # Bước: Lưu trữ thư viện PHP để lần sau chạy nhanh hơn
        id: composer-cache
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-

      - name: Copy .env # Bước: Tạo file cấu hình tạm thời cho môi trường test
        run: php -r "file_exists('.env') || copy('.env.example', '.env');"

      - name: Install Dependencies # Bước: Cài đặt các thư viện PHP (Laravel Vendor)
        if: steps.composer-cache.outputs.cache-hit != 'true'
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist --ignore-platform-reqs

      - name: Generate key # Bước: Tạo mã bảo mật APP_KEY cho Laravel
        run: php artisan key:generate

      - name: Directory Permissions # Bước: Phân quyền cho thư mục lưu trữ (để không bị lỗi ghi file)
        run: chmod -R 777 storage bootstrap/cache

      - name: Create SQLite Database # Bước: Tạo Database ảo (SQLite) để chạy Test cho nhanh
        run: |
          mkdir -p database
          touch database/database.sqlite

      # --- VAI TRÒ QUAN TRỌNG: ĐÓNG GÓI FRONTEND ---
      - name: Setup Node.js # Bước: Cài đặt Node.js để build giao diện (Vite/Vue)
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install NPM dependencies and Build Assets # Bước: Cài thư viện JS và nén file CSS/JS (NPM Build)
        run: |
          npm install
          npm run build

      - name: Execute tests # Bước: Chạy toàn bộ Unit Test để đảm bảo code không có lỗi logic
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan test

  docker-build-check: # Công việc 2: Kiểm tra khả năng đóng gói Docker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker Image (Check) # Bước: Thử build Docker thực tế để đảm bảo file Dockerfile không lỗi
        run: docker build . --file Dockerfile -t suckhoe24h-check:latest


