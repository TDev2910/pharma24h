name: 🚀 Build & Deploy to Production

# Kích hoạt workflow này khi có code được merge vào nhánh main
on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Cần quyền này để push lên ghcr.io

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Đăng nhập vào GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🛠️ Thiết lập Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Tạo metadata (tags, labels) cho Image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build và Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache để build nhanh hơn ở lần sau
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # JOB 2: Deploy lên Production Server qua SSH
  # (Chạy sau khi Job 1 thành công)
  # ============================================================
  deploy:
    name: Deploy lên Production
    runs-on: ubuntu-latest
    needs: build-and-push # Phải build xong mới deploy

    steps:
      - name: SSH vào Server và Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          port: ${{ secrets.PROD_SSH_PORT }}
          script: |
            # Di chuyển vào thư mục dự án trên cPanel
            cd /home/bjzezjqv/public_html

            # Nếu bạn dùng Git Version Control của cPanel, lệnh này sẽ kéo code về
            git pull origin main

            # Chạy composer cài đặt thư viện mới (Dùng PHP 8.2 của cPanel)
            php /usr/local/bin/composer install --no-dev --optimize-autoloader --no-interaction

            # Chạy migration database
            php artisan migrate --force

            # Tối ưu hóa cache
            php artisan optimize
