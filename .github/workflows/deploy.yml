name: CI - Kiểm tra code trước khi deploy

# Chỉ kích hoạt khi push lên main hoặc dev
on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]

jobs:
  laravel-ci:
    name: Kiểm tra code (CI)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, bcmath, gd, zip, sqlite3
          tools: composer:v2

      - name: 📦 Cache Composer packages
        id: composer-cache
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-

      - name: Tạo file .env tạm
        run: php -r "file_exists('.env') || copy('.env.example', '.env');"

      - name: Cài đặt Composer dependencies
        if: steps.composer-cache.outputs.cache-hit != 'true'
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist --ignore-platform-reqs

      - name: Generate APP_KEY
        run: php artisan key:generate

      - name: Phân quyền thư mục storage
        run: chmod -R 777 storage bootstrap/cache

      - name: Tạo SQLite Database test
        run: |
          mkdir -p database
          touch database/database.sqlite

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Build Frontend Assets (Vite)
        run: |
          npm install
          npm run build

      - name: Chạy Laravel Tests
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan test
